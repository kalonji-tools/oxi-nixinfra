name: Feature Request
description: Suggest a new feature or improvement
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use-case
      description: What problem does this solve? Who benefits and in what scenario?
      placeholder: |
        When testing a NixOS machine with custom systemd services, I want to...
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: A code sketch of how you'd like this to work. Does not need to be final.
      placeholder: |
        host = Host()
        svc = host.service("my-service")
        assert svc.is_running
        assert svc.is_enabled
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why they fall short.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, or any other relevant context.
    validations:
      required: false
