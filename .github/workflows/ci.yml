name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'python/**'
              - 'Cargo.*'
              - 'pyproject.toml'
              - '.github/**'
              - 'justfile'
              - 'devenv.nix'
              - 'tests/**'

  check:
    name: Static checks
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install code-quality tools
        run: |
          uv sync --group code-quality
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: just check

  test:
    name: Build & test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group test
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Rust unit tests
        run: just test-rust

      - name: Build extension
        run: just build

      - name: Integration tests
        run: just test

  test-nixos:
    name: NixOS VM tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run NixOS integration tests
        run: nix build .#checks.x86_64-linux.integration --print-build-logs

  required:
    name: CI (required)
    needs: [check, test, test-nixos]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        shell: bash
        run: |
          if [[ "${{ needs.check.result }}" =~ ^(failure|cancelled)$ || "${{ needs.test.result }}" =~ ^(failure|cancelled)$ || "${{ needs.test-nixos.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
