name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'python/**'
              - 'Cargo.*'
              - 'pyproject.toml'
              - '.github/**'
              - 'justfile'
              - 'devenv.nix'
              - 'tests/**'

  check:
    name: Static checks
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VIRTUAL_ENV: ${{ github.workspace }}/.venv
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9  # v2
        with:
          tool: just

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true

      - name: Install code-quality tools
        run: |
          uv sync --group code-quality
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: just check

  test:
    name: Rust unit tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Rust unit tests
        run: cargo test

  test-nixos:
    name: NixOS VM tests
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3  # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run NixOS integration tests
        run: nix build .#checks.x86_64-linux.integration --print-build-logs

  required:
    name: CI (required)
    needs: [check, test, test-nixos]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        shell: bash
        run: |
          if [[ "${{ needs.check.result }}" =~ ^(failure|cancelled)$ || "${{ needs.test.result }}" =~ ^(failure|cancelled)$ || "${{ needs.test-nixos.result }}" =~ ^(failure|cancelled)$ ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
