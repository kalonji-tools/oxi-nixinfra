name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v17
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Static checks
        shell: devenv shell bash -- -e {0}
        run: just check

      - name: Rust unit tests
        shell: devenv shell bash -- -e {0}
        run: just test-rust

      - name: Build extension
        shell: devenv shell bash -- -e {0}
        run: just build

      - name: Verify imports
        shell: devenv shell bash -- -e {0}
        run: |
          python -c "from oxi_nixinfra import Host, Service, File, User, NixPackage, NixOption, SystemInfo, AsyncHost, CommandResult; print('All imports OK')"

      - name: Integration tests (NixOS tests auto-skip)
        shell: devenv shell bash -- -e {0}
        run: just test
