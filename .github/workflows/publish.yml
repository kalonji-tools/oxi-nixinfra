name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i python3.12 python3.13

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist -i python3.12 python3.13

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: dist

  sdist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [linux, macos, sdist]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          found=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^##\ \[$VERSION\] ]]; then
              found=true
              echo "$line"
              continue
            fi
            if $found; then
              if [[ "$line" =~ ^##\  ]]; then
                break
              fi
              echo "$line"
            fi
          done < CHANGELOG.md > release-notes.txt

          if [ ! -s release-notes.txt ]; then
            echo "::warning::No CHANGELOG entry found for $VERSION, using fallback"
            echo "Release $GITHUB_REF_NAME" > release-notes.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.txt
