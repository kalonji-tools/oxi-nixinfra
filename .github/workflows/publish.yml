name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i python3.12 python3.13

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: |
            3.12
            3.13

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist -i python3.12 python3.13

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: wheels-macos
          path: dist

  sdist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b  # v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: wheels-sdist
          path: dist

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [linux, macos, sdist]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Verify wheels exist
        run: |
          count=$(find dist -name '*.whl' -o -name '*.tar.gz' | wc -l)
          echo "Found $count distribution files in dist/"
          ls -la dist/
          if [ "$count" -eq 0 ]; then
            echo "::error::No wheels or sdist found in dist/ — all build jobs may have failed"
            exit 1
          fi

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          found=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^##\ \[$VERSION\] ]]; then
              found=true
              echo "$line"
              continue
            fi
            if $found; then
              if [[ "$line" =~ ^##\  ]]; then
                break
              fi
              echo "$line"
            fi
          done < CHANGELOG.md > release-notes.txt

          if [ ! -s release-notes.txt ]; then
            echo "::warning::No CHANGELOG entry found for $VERSION, using fallback"
            echo "Release $GITHUB_REF_NAME" > release-notes.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          body_path: release-notes.txt
